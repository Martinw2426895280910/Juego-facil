<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>THE LAST COP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

/* HUD top bar */
#hud{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.75);border-bottom:1px solid #dc2626;display:none;align-items:center;justify-content:space-between;padding:0 14px;z-index:30}
#hud-level{color:#dc2626;font-size:18px;font-weight:900;letter-spacing:.1em;text-shadow:0 0 8px #dc2626}
#hud-center{display:flex;flex-direction:column;align-items:center;gap:1px}
#hud-score{color:#22d3ee;font-size:13px;font-weight:700}
#hud-kills{color:#facc15;font-size:11px}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
#hud-hp{color:#fff;font-size:13px}
#hud-pu{color:#a78bfa;font-size:11px;font-weight:700;animation:blink .5s infinite;min-height:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Bottom controls */
#controls{position:fixed;bottom:0;left:0;right:0;height:200px;display:none;z-index:30;pointer-events:none}

/* Joystick left */
#j-zone{position:absolute;bottom:20px;left:20px;pointer-events:all}
#j-base{width:140px;height:140px;border-radius:50%;background:rgba(30,30,30,.85);border:3px solid rgba(220,38,38,.6);position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(220,38,38,.3)}
#j-stick{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ef4444,#7f1d1d);border:2px solid #f87171;position:absolute;box-shadow:0 0 12px rgba(220,38,38,.6)}
#j-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:rgba(220,38,38,.7);font-size:9px;letter-spacing:.15em;white-space:nowrap}

/* Right buttons */
#r-btns{position:absolute;bottom:20px;right:16px;display:flex;flex-direction:column;gap:12px;align-items:flex-end;pointer-events:all}
#btn-fire{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(220,38,38,.5),rgba(127,29,29,.7));border:3px solid #dc2626;color:#fca5a5;font-family:'Courier New',monospace;font-size:13px;font-weight:900;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;box-shadow:0 0 25px rgba(220,38,38,.4);cursor:pointer}
#btn-fire:active{transform:scale(.93);background:radial-gradient(circle,rgba(220,38,38,.8),rgba(127,29,29,.9));box-shadow:0 0 40px #dc2626}
#btn-row2{display:flex;gap:10px;align-items:center}
#btn-grenade{width:68px;height:68px;border-radius:50%;background:rgba(30,30,50,.85);border:3px solid #3b82f6;color:#93c5fd;font-family:'Courier New',monospace;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;box-shadow:0 0 15px rgba(59,130,246,.3)}
#btn-grenade:active{transform:scale(.93)}
#btn-grenade.empty{opacity:.3;filter:grayscale(1)}
#g-cnt{font-size:9px;color:#93c5fd}
#btn-abort{background:rgba(0,0,0,.7);border:1px solid #4b5563;color:#6b7280;font-family:'Courier New',monospace;font-size:10px;letter-spacing:.08em;padding:6px 14px;cursor:pointer;border-radius:4px;pointer-events:all}
#btn-abort:active{background:#111;color:#fff}

/* Frozen overlay */
#frozen{position:fixed;inset:0;background:rgba(59,130,246,.1);pointer-events:none;display:none;z-index:25;animation:fp 1s infinite}
@keyframes fp{0%,100%{opacity:.8}50%{opacity:.2}}

/* SCREENS */
.scr{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px}
.scr-title{color:#dc2626;font-size:clamp(2.5rem,12vw,5rem);font-weight:900;letter-spacing:.15em;text-shadow:0 0 40px #dc2626;text-align:center;line-height:1}
.scr-sub{color:#9ca3af;font-size:clamp(.75rem,3vw,1rem);letter-spacing:.2em;margin-top:.3em;margin-bottom:1.5em;text-align:center}
.info-box{background:rgba(30,30,30,.8);border:1px solid #374151;border-radius:8px;padding:16px 20px;margin-bottom:1.5em;max-width:320px;width:100%}
.info-row{display:flex;align-items:center;gap:10px;margin:.35em 0;font-size:13px}
.info-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.info-text{color:#9ca3af;line-height:1.4}
.info-text strong{color:#e5e7eb}
.big-btn{width:100%;max-width:280px;padding:16px;background:#7f1d1d;border:2px solid #dc2626;color:#fff;font-family:'Courier New',monospace;font-size:1.1rem;font-weight:900;letter-spacing:.12em;cursor:pointer;border-radius:6px;text-transform:uppercase;margin-bottom:10px;box-shadow:0 0 20px rgba(220,38,38,.3)}
.big-btn:active{background:#dc2626;box-shadow:0 0 40px #dc2626;transform:scale(.97)}
.sec-btn{width:100%;max-width:280px;padding:12px;background:transparent;border:1px solid #4b5563;color:#6b7280;font-family:'Courier New',monospace;font-size:.9rem;letter-spacing:.1em;cursor:pointer;border-radius:6px;text-transform:uppercase;margin-bottom:10px}
.sec-btn:active{background:#111;color:#fff}
.stat-row{color:#9ca3af;font-size:.9rem;margin:.3em 0;text-align:center}
.stat-row span{color:#22d3ee;font-weight:700}
.hs-badge{color:#facc15;font-size:.85rem;margin-top:.8em;text-align:center}

/* Level up banner */
#scr-lu{background:rgba(0,0,0,.9)}
#lu-title{color:#22c55e;font-size:clamp(2rem,10vw,4rem);font-weight:900;letter-spacing:.1em;text-shadow:0 0 30px #22c55e;text-align:center}
#lu-info{color:#fff;font-size:1rem;text-align:center;margin-top:1em;opacity:.8;line-height:1.8}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Frozen overlay -->
<div id="frozen"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-level">LVL 1</div>
  <div id="hud-center">
    <div id="hud-score">SCORE: 0</div>
    <div id="hud-kills">KILLS: 0</div>
  </div>
  <div id="hud-right">
    <div id="hud-hp">❤️❤️❤️</div>
    <div id="hud-pu"></div>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="j-zone">
    <div id="j-base">
      <span id="j-label">MOVER</span>
      <div id="j-stick"></div>
    </div>
  </div>
  <div id="r-btns">
    <div id="btn-abort">SALIR</div>
    <div id="btn-row2">
      <div id="btn-grenade">
        <span style="font-size:18px">⏱</span>
        <span id="g-cnt">2</span>
      </div>
      <div id="btn-fire">FIRE</div>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="scr" id="scr-menu">
  <div class="scr-title">ZOMBIES</div>
  <div class="scr-sub">THE LAST COP</div>
  <div class="info-box">
    <div class="info-row"><span class="info-icon">🕹️</span><span class="info-text"><strong>Joystick</strong> izquierdo para moverte</span></div>
    <div class="info-row"><span class="info-icon">🔴</span><span class="info-text">Botón <strong>FIRE</strong> para disparar</span></div>
    <div class="info-row"><span class="info-icon">⏱</span><span class="info-text">Granada congela zombies 4 seg</span></div>
    <div class="info-row"><span class="info-icon">🟢</span><span class="info-text">Llega a la <strong>nave</strong> para subir de nivel</span></div>
    <div class="info-row"><span class="info-icon">💊</span><span class="info-text">Recoge items para potenciarte</span></div>
  </div>
  <button class="big-btn" id="btn-start">▶ JUGAR</button>
  <div class="hs-badge" id="hs-show" style="display:none">🏆 RÉCORD: <span id="hs-val">0</span></div>
</div>

<!-- GAME OVER -->
<div class="scr" id="scr-go" style="display:none">
  <div class="scr-title" style="font-size:clamp(2rem,9vw,4rem)">GAME OVER</div>
  <div style="height:1.2em"></div>
  <div id="go-stats" style="margin-bottom:1.5em;text-align:center"></div>
  <button class="big-btn" id="btn-retry">↺ REINTENTAR</button>
  <button class="sec-btn" id="btn-tomenu">MENÚ</button>
</div>

<!-- LEVEL UP -->
<div class="scr" id="scr-lu" style="display:none">
  <div id="lu-title">NIVEL SUPERADO</div>
  <div id="lu-info"></div>
</div>

<script>
// ════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════
let _ac=null;
const getAC=()=>{ if(!_ac)_ac=new AudioContext(); if(_ac.state==='suspended')_ac.resume(); return _ac; };
const tone=(f,d,type='square',vol=.1)=>{
  try{
    const ctx=getAC(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start();o.stop(ctx.currentTime+d);
  }catch(_){}
};
const sShoot=()=>tone(900,.07,'sawtooth',.1);
const sHit=()=>tone(160,.25,'triangle',.12);
const sDie=()=>{tone(350,.2,'sawtooth',.2);setTimeout(()=>tone(180,.4,'triangle',.15),150)};
const sWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.15),i*110));
const sPU=()=>[440,550,660].forEach((f,i)=>setTimeout(()=>tone(f,.12,'sine',.12),i*70));
const sNuke=()=>[200,150,100,80].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sawtooth',.2),i*90));

// ════════════════════════════════════════════
// CANVAS
// ════════════════════════════════════════════
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H,CTRL_H=200;
const resize=()=>{ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; };
resize(); window.addEventListener('resize',resize);

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const HS='tlc_hs';
let gs='menu',level=1,lives=3,score=0,kills=0,grenades=2;
let frozen=false,freezeEnd=0,puType=null,puEnd=0;
let player,zombies=[],bosses=[],bullets=[],items=[],exitP;
let RAF=0,lastItem=0,lastAuto=0,lastAmb=0,uid=0;
const SAFE=200,PSP=4.8,ZSP=0.85,BSP=0.5,BSPD=13,AR=250,AI=520;
const rnd=(a,b)=>a+Math.random()*(b-a);
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const safe=(av,r)=>{ let p,n=0; do{p={x:rnd(40,W-40),y:rnd(56,H-CTRL_H-20)};n++;}while(dst(p,av)<r&&n<100); return p; };

// ════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════
const drawBG=()=>{
  cx.fillStyle=`rgb(${8+level*2},${5+level},${5+level})`; cx.fillRect(0,0,W,H);
  cx.strokeStyle=`rgba(${35+level*4},${18+level},${18+level},.22)`; cx.lineWidth=1;
  for(let x=0;x<W;x+=48){cx.beginPath();cx.moveTo(x,52);cx.lineTo(x,H-CTRL_H);cx.stroke();}
  for(let y=52;y<H-CTRL_H;y+=48){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  const vg=cx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.8);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.65)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
};

const drawCop=(x,y,dir,mv)=>{
  const t=Date.now(),bob=mv?Math.sin(t*.016)*2.5:0,fl=dir<0?-1:1;
  cx.save();cx.translate(x,y+bob);cx.scale(fl,1);
  // shadow
  cx.fillStyle='rgba(0,0,0,.3)';cx.beginPath();cx.ellipse(0,20,13,4,0,0,Math.PI*2);cx.fill();
  // legs
  const ls=mv?Math.sin(t*.018)*7:0;
  cx.fillStyle='#1e3a5f';
  cx.beginPath();cx.roundRect(-7,8+ls,6,14,3);cx.fill();
  cx.beginPath();cx.roundRect(1,8-ls,6,14,3);cx.fill();
  cx.fillStyle='#111';
  cx.beginPath();cx.roundRect(-8,21+ls,8,5,2);cx.fill();
  cx.beginPath();cx.roundRect(0,21-ls,8,5,2);cx.fill();
  // body
  cx.fillStyle='#1d4ed8';cx.beginPath();cx.roundRect(-9,-2,18,12,3);cx.fill();
  cx.fillStyle='#854d0e';cx.fillRect(-9,8,18,3);
  cx.fillStyle='#fbbf24';cx.beginPath();cx.arc(-3,2,3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1d4ed8';cx.beginPath();cx.arc(-3,2,1.5,0,Math.PI*2);cx.fill();
  // arms + gun
  const as=mv?Math.sin(t*.018)*5:0;
  cx.fillStyle='#1d4ed8';
  cx.beginPath();cx.roundRect(-14,-1+as,6,10,3);cx.fill();
  cx.beginPath();cx.roundRect(8,-1-as,6,10,3);cx.fill();
  cx.fillStyle='#374151';cx.beginPath();cx.roundRect(13,1,10,4,2);cx.fill();
  cx.fillStyle='#111';cx.beginPath();cx.roundRect(22,2,4,3,1);cx.fill();
  // head
  cx.fillStyle='#f3d0a0';cx.beginPath();cx.ellipse(0,-10,9,10,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1d4ed8';cx.beginPath();cx.arc(0,-14,10,Math.PI,0);cx.fill();
  cx.fillStyle='#1e40af';cx.fillRect(-10,-15,20,4);
  cx.fillStyle='#fbbf24';cx.beginPath();cx.arc(0,-15,2.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1e293b';
  cx.beginPath();cx.ellipse(-3,-10,2.5,2,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(3,-10,2.5,2,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(-3,-10,1.2,1,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(3,-10,1.2,1,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#8b4513';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,-7,3,0,Math.PI);cx.stroke();
  cx.restore();
};

const drawZombie=(x,y,dir,fr)=>{
  const t=Date.now(),bob=Math.sin(t*.009+x*.01)*1.5,fl=dir<0?-1:1;
  cx.save();cx.translate(x,y+bob);cx.scale(fl,1);
  if(fr){cx.filter='hue-rotate(175deg) brightness(1.4)';}
  cx.fillStyle='rgba(0,0,0,.25)';cx.beginPath();cx.ellipse(0,20,11,4,0,0,Math.PI*2);cx.fill();
  // legs
  cx.fillStyle='#4a3728';
  cx.beginPath();cx.roundRect(-7,8,6,14,2);cx.fill();
  cx.beginPath();cx.roundRect(1,8,6,14,2);cx.fill();
  cx.fillStyle='#2d1f14';
  cx.beginPath();cx.moveTo(-7,20);cx.lineTo(-4,25);cx.lineTo(-1,20);cx.fill();
  cx.beginPath();cx.moveTo(1,20);cx.lineTo(4,25);cx.lineTo(7,20);cx.fill();
  // body
  cx.fillStyle='#5c4033';cx.beginPath();cx.roundRect(-9,-2,18,11,2);cx.fill();
  cx.fillStyle='rgba(180,20,20,.55)';
  cx.beginPath();cx.ellipse(-2,2,4,3,-.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(4,0,2,2,0,0,Math.PI*2);cx.fill();
  // arms lunging
  const lg=Math.sin(t*.011)*10;
  cx.fillStyle='#7a9a5c';
  cx.beginPath();cx.roundRect(-18,-2+lg*.4,10,6,3);cx.fill();
  cx.beginPath();cx.roundRect(8,-2-lg*.4,10,6,3);cx.fill();
  cx.fillStyle='#556b3d';
  cx.beginPath();cx.moveTo(-18,-2+lg*.4);cx.lineTo(-23,-5+lg*.4);cx.lineTo(-21,0+lg*.4);cx.fill();
  cx.beginPath();cx.moveTo(18,-2-lg*.4);cx.lineTo(23,-5-lg*.4);cx.lineTo(21,0-lg*.4);cx.fill();
  // head
  cx.fillStyle='#7a9a5c';cx.beginPath();cx.ellipse(0,-10,9,9,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#556b3d';
  cx.beginPath();cx.ellipse(-3,-8,3,2,-.5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(4,-12,2,2,0,0,Math.PI*2);cx.fill();
  // eyes glowing red
  cx.fillStyle='#dc2626';
  cx.beginPath();cx.ellipse(-3,-10,3,2.5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(3,-10,3,2.5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fee2e2';
  cx.beginPath();cx.arc(-3,-10,1.2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(3,-10,1.2,0,Math.PI*2);cx.fill();
  // mouth
  cx.fillStyle='#1a0a00';
  cx.beginPath();cx.moveTo(-5,-4);cx.lineTo(-3,-6);cx.lineTo(-1,-4);cx.lineTo(1,-6);cx.lineTo(3,-4);cx.lineTo(5,-6);cx.lineTo(5,-3);cx.lineTo(-5,-3);cx.fill();
  cx.fillStyle='#e5d5a0';cx.fillRect(-4,-5.5,2,2);cx.fillRect(0,-5.5,2,2);
  // hair patches
  cx.fillStyle='#2d1f14';
  cx.beginPath();cx.arc(-4,-18,4,Math.PI,0);cx.fill();
  cx.beginPath();cx.arc(4,-17,3,Math.PI,0);cx.fill();
  cx.filter='none';cx.restore();
};

const drawBoss=(x,y,hp,maxHp)=>{
  const t=Date.now(),p=1+Math.sin(t*.007)*.05;
  cx.save();cx.translate(x,y);cx.scale(p,p);
  cx.fillStyle='rgba(0,0,0,.35)';cx.beginPath();cx.ellipse(0,30,22,7,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#4a2020';
  cx.beginPath();cx.roundRect(-12,12,10,20,3);cx.fill();
  cx.beginPath();cx.roundRect(2,12,10,20,3);cx.fill();
  cx.fillStyle='#1a0a00';
  cx.beginPath();cx.roundRect(-14,29,14,7,3);cx.fill();
  cx.beginPath();cx.roundRect(0,29,14,7,3);cx.fill();
  cx.fillStyle='#7f1d1d';cx.beginPath();cx.roundRect(-16,-8,32,22,4);cx.fill();
  cx.strokeStyle='rgba(0,0,0,.25)';cx.lineWidth=1.5;
  for(let i=-12;i<=12;i+=5){cx.beginPath();cx.moveTo(i,-6);cx.lineTo(i,12);cx.stroke();}
  cx.fillStyle='rgba(200,0,0,.65)';
  cx.beginPath();cx.ellipse(-6,4,3,4,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(6,8,2,3,0,0,Math.PI*2);cx.fill();
  const sw=Math.sin(t*.01)*14;
  cx.fillStyle='#991b1b';
  cx.beginPath();cx.roundRect(-32,-5+sw,16,10,4);cx.fill();
  cx.beginPath();cx.roundRect(16,-5-sw,16,10,4);cx.fill();
  cx.fillStyle='#991b1b';
  cx.beginPath();cx.ellipse(0,-18,14,13,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#7f1d1d';
  cx.beginPath();cx.moveTo(-10,-28);cx.lineTo(-14,-38);cx.lineTo(-6,-26);cx.fill();
  cx.beginPath();cx.moveTo(10,-28);cx.lineTo(14,-38);cx.lineTo(6,-26);cx.fill();
  const gl=.6+Math.sin(t*.013)*.4;
  cx.fillStyle=`rgba(255,150,0,${gl})`;
  cx.beginPath();cx.ellipse(-5,-19,4,3,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(5,-19,4,3,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(-5,-19,1.5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(5,-19,1.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e5d5a0';
  cx.beginPath();cx.moveTo(-6,-10);cx.lineTo(-4,-6);cx.lineTo(-2,-10);cx.fill();
  cx.beginPath();cx.moveTo(2,-10);cx.lineTo(4,-6);cx.lineTo(6,-10);cx.fill();
  cx.strokeStyle='#1a0a00';cx.lineWidth=2;
  cx.beginPath();cx.arc(0,-13,6,0,Math.PI);cx.stroke();
  // HP bar
  const bw=48,bx=-24,by=-46;
  cx.fillStyle='#1f2937';cx.fillRect(bx,by,bw,7);
  const pc=Math.max(0,hp/maxHp);
  cx.fillStyle=pc>.5?'#22c55e':pc>.25?'#f59e0b':'#dc2626';
  cx.fillRect(bx,by,bw*pc,7);
  cx.strokeStyle='#374151';cx.lineWidth=1;cx.strokeRect(bx,by,bw,7);
  cx.fillStyle='#fff';cx.font='bold 8px Courier New';cx.textAlign='center';
  cx.fillText('BOSS',0,by-3);
  cx.restore();
};

const drawBullet=(x,y,sp)=>{
  cx.save();cx.translate(x,y);
  if(sp){cx.fillStyle='#f97316';cx.shadowColor='#f97316';cx.shadowBlur=9;cx.beginPath();cx.ellipse(0,0,7,3,0,0,Math.PI*2);cx.fill();}
  else{cx.fillStyle='#fef08a';cx.shadowColor='#fef08a';cx.shadowBlur=7;cx.beginPath();cx.arc(0,0,4,0,Math.PI*2);cx.fill();}
  cx.shadowBlur=0;cx.restore();
};

const ITEMS_DEF={MEDKIT:{c:'#22c55e',l:'HP'},SHOTGUN:{c:'#f59e0b',l:'SG'},MACHINE_GUN:{c:'#f97316',l:'MG'},SPEED:{c:'#3b82f6',l:'SP'},NUKE:{c:'#a78bfa',l:'NU'},GRENADE:{c:'#22d3ee',l:'GR'}};
const drawItem=(it)=>{
  const t=Date.now(),bob=Math.sin(t*.005+it.id)*3.5;
  cx.save();cx.translate(it.x,it.y+bob);
  const pl=.45+Math.sin(t*.008+it.id)*.55;
  cx.globalAlpha=pl;
  cx.strokeStyle=it.c;cx.lineWidth=2;
  cx.beginPath();cx.arc(0,0,20,0,Math.PI*2);cx.stroke();
  cx.globalAlpha=1;
  cx.fillStyle=it.c+'30';cx.beginPath();cx.arc(0,0,15,0,Math.PI*2);cx.fill();
  cx.fillStyle=it.c;cx.beginPath();cx.arc(0,0,11,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 9px Courier New';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(it.l,0,0);cx.restore();
};

const drawExit=(x,y)=>{
  const t=Date.now(),p=1+Math.sin(t*.006)*.07;
  cx.save();cx.translate(x,y);
  // beam
  cx.globalAlpha=.12+Math.sin(t*.01)*.07;
  cx.fillStyle='#22c55e';
  cx.beginPath();cx.moveTo(-10,10);cx.lineTo(10,10);cx.lineTo(20,36);cx.lineTo(-20,36);cx.fill();
  cx.globalAlpha=1;
  // pad
  cx.fillStyle='rgba(34,197,94,.18)';
  cx.beginPath();cx.ellipse(0,20,28,8,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#22c55e';cx.lineWidth=2;
  cx.beginPath();cx.ellipse(0,20,28,8,0,0,Math.PI*2);cx.stroke();
  cx.strokeStyle='rgba(34,197,94,.4)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(-22,20);cx.lineTo(22,20);cx.stroke();
  cx.beginPath();cx.moveTo(0,12);cx.lineTo(0,28);cx.stroke();
  // glow rings
  cx.strokeStyle='#22c55e';cx.lineWidth=1.5;
  for(let r=32;r<=52;r+=10){
    cx.globalAlpha=.08+(28/r)*.18;
    cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.stroke();
  }
  cx.globalAlpha=1;
  // saucer
  cx.scale(p,p);
  cx.fillStyle='#1a3a4a';cx.beginPath();cx.ellipse(0,0,24,8,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#0f6b8a';cx.beginPath();cx.ellipse(0,-2,18,6,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(34,211,238,.25)';
  cx.beginPath();cx.ellipse(0,-6,12,8,0,Math.PI,Math.PI*2);cx.fill();
  cx.strokeStyle='#22d3ee';cx.lineWidth=1.5;
  cx.beginPath();cx.ellipse(0,-6,12,8,0,Math.PI,Math.PI*2);cx.stroke();
  [{x:-20,c:'#ef4444'},{x:0,c:'#22c55e'},{x:20,c:'#3b82f6'}].forEach(l=>{
    cx.fillStyle=l.c;cx.shadowColor=l.c;cx.shadowBlur=6;
    cx.beginPath();cx.arc(l.x,2,3,0,Math.PI*2);cx.fill();
  });
  cx.shadowBlur=0;
  cx.fillStyle='#22c55e';cx.font='bold 9px Courier New';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText('ESCAPE',0,12);
  cx.restore();
};

// ════════════════════════════════════════════
// JOYSTICK
// ════════════════════════════════════════════
const jBase=document.getElementById('j-base');
const jStick=document.getElementById('j-stick');
let jActive=false,jDx=0,jDy=0,aimDir={x:1,y:0};

const jMov=(cx2,cy2)=>{
  const r=jBase.getBoundingClientRect();
  const mx=r.left+r.width/2,my=r.top+r.height/2,maxD=r.width/2*.85;
  const dx=cx2-mx,dy=cy2-my,d=Math.min(maxD,Math.hypot(dx,dy)),ang=Math.atan2(dy,dx);
  const sx=Math.cos(ang)*d,sy=Math.sin(ang)*d;
  jStick.style.transform=`translate(${sx}px,${sy}px)`;
  jDx=sx/maxD;jDy=sy/maxD;
  if(d>6){aimDir={x:sx/maxD,y:sy/maxD};}
};
const jEnd=()=>{
  jActive=false;jDx=0;jDy=0;
  jStick.style.transition='transform .1s';jStick.style.transform='translate(0,0)';
  setTimeout(()=>jStick.style.transition='',120);
  window.removeEventListener('touchmove',jTM);window.removeEventListener('touchend',jEnd);
  window.removeEventListener('mousemove',jTM);window.removeEventListener('mouseup',jEnd);
};
const jTM=e=>{if(!jActive)return;if(e.cancelable)e.preventDefault();const t='touches' in e?e.touches[0]:e;jMov(t.clientX,t.clientY);};
jBase.addEventListener('touchstart',e=>{e.preventDefault();jActive=true;jStick.style.transition='none';jMov(e.touches[0].clientX,e.touches[0].clientY);window.addEventListener('touchmove',jTM,{passive:false});window.addEventListener('touchend',jEnd);},{passive:false});
jBase.addEventListener('mousedown',e=>{jActive=true;jStick.style.transition='none';jMov(e.clientX,e.clientY);window.addEventListener('mousemove',jTM);window.addEventListener('mouseup',jEnd);});

// ════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════
const spawnBul=(ao,sp=false)=>{
  const spd=BSPD*(sp?1.5:1),len=Math.hypot(aimDir.x,aimDir.y)||1;
  const bx=aimDir.x/len,by=aimDir.y/len,c=Math.cos(ao),s=Math.sin(ao);
  bullets.push({id:uid++,x:player.x,y:player.y,vx:(bx*c-by*s)*spd,vy:(bx*s+by*c)*spd,isSpecial:sp});
};
const shoot=()=>{
  sShoot();
  if(puType==='MACHINE_GUN'&&Date.now()<puEnd){
    spawnBul(0,true);setTimeout(()=>spawnBul(.12,true),50);setTimeout(()=>spawnBul(-.12,true),100);
  }else if(puType==='SHOTGUN'&&Date.now()<puEnd){
    spawnBul(0);spawnBul(.22);spawnBul(-.22);
  }else spawnBul(0);
};
const grenade=()=>{
  if(grenades>0&&!frozen){
    sPU();grenades--;frozen=true;freezeEnd=Date.now()+4000;
    document.getElementById('frozen').style.display='block';
    showPU('⏱ TIEMPO CONGELADO');updateHUD();
  }
};
const spawnItem=()=>{
  const r=Math.random();
  const t=r<.2?'MEDKIT':r<.35?'GRENADE':r<.5?'SPEED':r<.7?'SHOTGUN':r<.9?'MACHINE_GUN':'NUKE';
  const d=ITEMS_DEF[t];
  items.push({id:uid++,x:rnd(50,W-50),y:rnd(60,H-CTRL_H-40),type:t,c:d.c,l:d.l});
};

// ════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════
const showPU=(msg)=>{
  const el=document.getElementById('hud-pu');
  el.textContent=msg;
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.textContent='';},3000);
};
const updateHUD=()=>{
  document.getElementById('hud-level').textContent=`LVL ${level}`;
  document.getElementById('hud-score').textContent=`SCORE: ${score}`;
  document.getElementById('hud-kills').textContent=`KILLS: ${kills}`;
  document.getElementById('hud-hp').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('g-cnt').textContent=grenades;
  document.getElementById('btn-grenade').classList.toggle('empty',grenades===0);
};

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
const initGame=()=>{
  level=1;lives=3;score=0;kills=0;grenades=2;
  frozen=false;freezeEnd=0;puType=null;puEnd=0;uid=0;
  initRound();
};
const initRound=()=>{
  player={x:W/2,y:(H-CTRL_H)/2+52,dir:1,moving:false};
  exitP=safe(player,SAFE);
  bullets=[];items=[];bosses=[];
  frozen=false;puType=null;
  document.getElementById('frozen').style.display='none';
  const zc=3+Math.floor(level*1.5);
  zombies=Array.from({length:zc},()=>({id:uid++,...safe(player,SAFE),dir:1}));
  if(level>=3){
    for(let i=0;i<Math.floor(level/3);i++){
      const hp=15+level*5;
      bosses.push({id:uid++,...safe(player,SAFE),hp,maxHp:hp});
    }
  }
  updateHUD();
};

// ════════════════════════════════════════════
// LOOP
// ════════════════════════════════════════════
const loop=()=>{
  if(gs!=='playing')return;
  RAF=requestAnimationFrame(loop);
  const now=Date.now();

  if(frozen&&now>freezeEnd){frozen=false;document.getElementById('frozen').style.display='none';}
  if(puType&&now>puEnd){puType=null;document.getElementById('hud-pu').textContent='';}
  if(now-lastItem>5000){if(Math.random()>.4)spawnItem();lastItem=now;}

  // Auto-shoot
  if(now-lastAuto>AI){
    let nd=Infinity,nd2={x:1,y:0};
    [...zombies,...bosses].forEach(z=>{const d=dst(player,z);if(d<nd&&d<AR){nd=d;nd2={x:(z.x-player.x)/d,y:(z.y-player.y)/d};}});
    if(nd<AR){aimDir=nd2;shoot();lastAuto=now;}
  }

  // Move player
  let spd=PSP*(puType==='SPEED'&&now<puEnd?1.6:1),mv=false;
  if(Math.abs(jDx)>.04||Math.abs(jDy)>.04){
    player.x+=jDx*spd;player.y+=jDy*spd;player.dir=jDx<0?-1:1;mv=true;
  }
  const topLimit=56,botLimit=H-CTRL_H-10;
  player.x=Math.max(18,Math.min(W-18,player.x));
  player.y=Math.max(topLimit,Math.min(botLimit,player.y));
  player.moving=mv;

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20)bullets.splice(i,1);
  }

  // Zombies
  const zspd=(ZSP+level*.1)*(frozen?0:1);
  let caught=false;
  for(let zi=zombies.length-1;zi>=0;zi--){
    const z=zombies[zi];let dead=false;
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      if(dst(z,b)<20){dead=true;bullets.splice(bi,1);score+=10+level*5;kills++;sHit();break;}
    }
    if(dead){zombies[zi]={id:uid++,...safe(player,SAFE),dir:1};}
    else{
      const ang=Math.atan2(player.y-z.y,player.x-z.x);
      z.x+=Math.cos(ang)*zspd;z.y+=Math.sin(ang)*zspd;
      z.dir=player.x<z.x?-1:1;
      if(dst(z,player)<22)caught=true;
    }
  }

  // Bosses
  const bspd=BSP*(frozen?0:1);
  for(let bi=bosses.length-1;bi>=0;bi--){
    const boss=bosses[bi];
    for(let bui=bullets.length-1;bui>=0;bui--){
      const b=bullets[bui];
      if(dst(boss,b)<30){boss.hp-=b.isSpecial?3:1;bullets.splice(bui,1);if(boss.hp<=0){score+=200+level*50;kills+=10;sNuke();bosses.splice(bi,1);break;}}
    }
    if(bosses[bi]){
      const ang=Math.atan2(player.y-boss.y,player.x-boss.x);
      boss.x+=Math.cos(ang)*bspd;boss.y+=Math.sin(ang)*bspd;
      if(dst(boss,player)<34)caught=true;
    }
  }

  // Items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(dst(it,player)<26){
      items.splice(i,1);score+=50;
      if(it.type==='NUKE'){sNuke();showPU('☢ NUKE!');zombies.forEach((_,zi)=>{zombies[zi]={id:uid++,...safe(player,SAFE),dir:1};});bosses.forEach(b=>b.hp-=5);score+=zombies.length*10;kills+=zombies.length;}
      else if(it.type==='MEDKIT'){sPU();lives=Math.min(5,lives+1);showPU('💊 +1 VIDA');}
      else if(it.type==='GRENADE'){sPU();grenades++;showPU('⏱ GRANADA +1');}
      else{sPU();puType=it.type;puEnd=now+(it.type==='MACHINE_GUN'?8000:10000);showPU('★ '+it.type.replace('_',' '));}
      updateHUD();
    }
  }

  updateHUD();
  if(caught){onDeath();return;}
  if(dst(player,exitP)<30){onLevelUp();return;}
  if(now-lastAmb>Math.max(700,2200-level*120)){if(Math.random()>.6)sHit();lastAmb=now;}

  // ─── RENDER ─────────────────────────────
  drawBG();
  drawExit(exitP.x,exitP.y);
  items.forEach(it=>drawItem(it));
  bullets.forEach(b=>drawBullet(b.x,b.y,b.isSpecial));
  zombies.forEach(z=>drawZombie(z.x,z.y,z.dir,frozen));
  bosses.forEach(b=>drawBoss(b.x,b.y,b.hp,b.maxHp));
  drawCop(player.x,player.y,player.dir,player.moving);

  // Controls area divider
  cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(0,H-CTRL_H,W,CTRL_H);
  cx.strokeStyle='rgba(220,38,38,.4)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,H-CTRL_H);cx.lineTo(W,H-CTRL_H);cx.stroke();
};

// ════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════
const onDeath=()=>{
  cancelAnimationFrame(RAF);sDie();lives--;
  if(lives>0){
    updateHUD();
    // red flash
    cx.fillStyle='rgba(220,38,38,.45)';cx.fillRect(0,0,W,H);
    setTimeout(()=>{initRound();gs='playing';lastItem=Date.now();lastAuto=Date.now();requestAnimationFrame(loop);},1100);
  }else{
    gs='gameover';
    const hs=parseInt(localStorage.getItem(HS)||'0');
    if(score>hs)localStorage.setItem(HS,score);
    document.getElementById('go-stats').innerHTML=`
      <div class="stat-row">NIVEL: <span>${level}</span></div>
      <div class="stat-row">KILLS: <span>${kills}</span></div>
      <div class="stat-row">SCORE: <span>${score.toLocaleString()}</span></div>
      ${score>=hs&&score>0?'<div style="color:#facc15;margin-top:.6em">🏆 NUEVO RÉCORD</div>':''}`;
    document.getElementById('scr-go').style.display='flex';
    showControls(false);
  }
};

const onLevelUp=()=>{
  cancelAnimationFrame(RAF);sWin();
  score+=level*500;level++;lives=Math.min(5,lives+1);
  const lu=document.getElementById('scr-lu');
  document.getElementById('lu-info').innerHTML=`+${(level-1)*500} PTS · +1 VIDA<br><span style="color:#9ca3af;font-size:.8rem">PREPARANDO NIVEL ${level}...</span>`;
  lu.style.display='flex';
  setTimeout(()=>{lu.style.display='none';initRound();gs='playing';lastItem=Date.now();lastAuto=Date.now();requestAnimationFrame(loop);},2400);
};

const showControls=(show)=>{
  document.getElementById('controls').style.display=show?'flex':'none';
  document.getElementById('hud').style.display=show?'flex':'none';
};

const startFromMenu=()=>{
  document.getElementById('scr-menu').style.display='none';
  initGame();gs='playing';
  showControls(true);lastItem=Date.now();lastAuto=Date.now();
  requestAnimationFrame(loop);
};

document.getElementById('btn-start').addEventListener('click',startFromMenu);
document.getElementById('btn-start').addEventListener('touchend',e=>{e.preventDefault();startFromMenu();});

document.getElementById('btn-retry').addEventListener('click',()=>{
  document.getElementById('scr-go').style.display='none';
  initGame();gs='playing';showControls(true);lastItem=Date.now();lastAuto=Date.now();requestAnimationFrame(loop);
});
document.getElementById('btn-retry').addEventListener('touchend',e=>{e.preventDefault();
  document.getElementById('scr-go').style.display='none';
  initGame();gs='playing';showControls(true);lastItem=Date.now();lastAuto=Date.now();requestAnimationFrame(loop);
});

document.getElementById('btn-tomenu').addEventListener('click',()=>{
  document.getElementById('scr-go').style.display='none';
  gs='menu';showControls(false);document.getElementById('scr-menu').style.display='flex';
  const hs=localStorage.getItem(HS);if(hs&&parseInt(hs)>0){document.getElementById('hs-show').style.display='block';document.getElementById('hs-val').textContent=parseInt(hs).toLocaleString();}
});

document.getElementById('btn-abort').addEventListener('click',()=>{
  cancelAnimationFrame(RAF);gs='menu';showControls(false);
  document.getElementById('scr-menu').style.display='flex';
  const hs=localStorage.getItem(HS);if(hs&&parseInt(hs)>0){document.getElementById('hs-show').style.display='block';document.getElementById('hs-val').textContent=parseInt(hs).toLocaleString();}
});
document.getElementById('btn-abort').addEventListener('touchend',e=>{e.preventDefault();
  cancelAnimationFrame(RAF);gs='menu';showControls(false);
  document.getElementById('scr-menu').style.display='flex';
});

const fireTouchStart=e=>{e.preventDefault();if(gs==='playing')shoot();};
const grenTouchStart=e=>{e.preventDefault();if(gs==='playing')grenade();};
document.getElementById('btn-fire').addEventListener('touchstart',fireTouchStart,{passive:false});
document.getElementById('btn-fire').addEventListener('mousedown',e=>{e.preventDefault();if(gs==='playing')shoot();});
document.getElementById('btn-grenade').addEventListener('touchstart',grenTouchStart,{passive:false});
document.getElementById('btn-grenade').addEventListener('mousedown',e=>{e.preventDefault();if(gs==='playing')grenade();});

// Init HS display
const hs0=localStorage.getItem(HS);
if(hs0&&parseInt(hs0)>0){document.getElementById('hs-show').style.display='block';document.getElementById('hs-val').textContent=parseInt(hs0).toLocaleString();}

// Initial bg render
drawBG();
</script>
